<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stundenzettel">
    <title>Stundenzettel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4f9ff0 0%, #357abd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        .logo-section {
            margin-bottom: 60px;
            animation: slideDown 0.6s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { font-size: 80px; margin-bottom: 24px; }
        .logo-title {
            font-size: 36px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }
        .logo-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
        }
        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }
        .choice-card {
            background: white;
            border-radius: 20px;
            padding: 40px 24px;
            box-shadow: 0 20px 60px rgba(53, 122, 189, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid transparent;
            animation: slideUp 0.6s ease-out;
        }
        .choice-card:nth-child(2) { animation-delay: 0.1s; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .choice-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 80px rgba(53, 122, 189, 0.3);
        }
        .choice-card.admin { border-color: #357abd; }
        .choice-card.admin:hover { border-color: #4f9ff0; }
        .choice-card.user { border-color: #4f9ff0; }
        .choice-card.user:hover { border-color: #357abd; }
        .choice-icon { font-size: 56px; margin-bottom: 16px; }
        .choice-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .choice-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }
        .footer {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-top: 40px;
        }
        .modal-pass {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-pass.active {
            display: flex;
        }
        .modal-pass-content {
            background: white;
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.3s ease-out;
        }
        .modal-pass-content h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .modal-pass-content p {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .pass-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8eef5;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .pass-input:focus {
            outline: none;
            border-color: #4f9ff0;
            box-shadow: 0 4px 16px rgba(79, 159, 240, 0.1);
        }
        .pass-buttons {
            display: flex;
            gap: 12px;
        }
        .pass-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .pass-btn.ok {
            background: linear-gradient(135deg, #4f9ff0 0%, #357abd 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 159, 240, 0.3);
        }
        .pass-btn.ok:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 159, 240, 0.4);
        }
        .pass-btn.cancel {
            background: #f0f6fc;
            color: #357abd;
            border: 2px solid #e8eef5;
        }
        .pass-btn.cancel:hover {
            background: #e8eef5;
        }
        .pass-error {
            color: #d32f2f;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
        }
        .pass-error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">⏰</div>
            <h1 class="logo-title">Stundenzettel</h1>
            <p class="logo-subtitle">Zeiterfassung leicht gemacht</p>
        </div>

        <div class="choices">
            <a href="javascript:openPasswordModal()" class="choice-card admin">
                <div class="choice-icon">🔐</div>
                <h2 class="choice-title">Administrator</h2>
                <p class="choice-desc">Alle Mitarbeiter & Saldo</p>
            </a>

            <a href="setup.html" class="choice-card user">
                <div class="choice-icon">👤</div>
                <h2 class="choice-title">Mitarbeiter</h2>
                <p class="choice-desc">Stundenzettel einrichten</p>
            </a>
        </div>

        <div class="footer">💾 Alle Daten lokal gespeichert</div>
    </div>

    <!-- Password Modal -->
    <div class="modal-pass" id="passwordModal">
        <div class="modal-pass-content">
            <h2>🔐 Administrator</h2>
            <p>Gib das Passwort ein</p>
            <div class="pass-error" id="passError">❌ Falsches Passwort!</div>
            <input type="password" class="pass-input" id="passInput" placeholder="Passwort" autocomplete="off">
            <div class="pass-buttons">
                <button class="pass-btn cancel" onclick="closePasswordModal()">Abbrechen</button>
                <button class="pass-btn ok" onclick="checkPassword()">OK</button>
            </div>
        </div>
    <script>
        const PASSWORD = 'owa';

        function openPasswordModal() {
            const modal = document.getElementById('passwordModal');
            if (modal) {
                modal.classList.add('active');
                setTimeout(() => {
                    const input = document.getElementById('passInput');
                    if (input) input.focus();
                }, 100);
            }
        }

        function closePasswordModal() {
            const modal = document.getElementById('passwordModal');
            const input = document.getElementById('passInput');
            const error = document.getElementById('passError');
            
            if (modal) modal.classList.remove('active');
            if (input) input.value = '';
            if (error) error.classList.remove('show');
        }

        function checkPassword() {
            const input = document.getElementById('passInput');
            const error = document.getElementById('passError');
            
            if (!input || !error) return;

            const password = input.value;

            if (password === PASSWORD) {
                error.classList.remove('show');
                // 🔒 Speichere Admin-Authentifizierung
                sessionStorage.setItem('admin_authenticated', 'true');
                window.location.href = 'dashboard.html';
            } else {
                error.classList.add('show');
                input.value = '';
                input.focus();
            }
        }

        // Enter-Taste unterstützen
        document.addEventListener('DOMContentLoaded', () => {
            const passInput = document.getElementById('passInput');
            if (passInput) {
                passInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        checkPassword();
                    }
                });
            }
        });
    </script>
