<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="cache-control" content="no-cache, no-store, must-revalidate">
    <title>Stundenzettel – Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4f9ff0 0%, #357abd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(63, 122, 189, 0.2);
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            color: #357abd;
            margin-bottom: 8px;
        }

        .header-subtitle {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
            background: #f5f9ff;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #e8eef5;
        }

        .day-label {
            font-size: 14px;
            font-weight: 600;
            color: #357abd;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .time-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .time-input {
            display: flex;
            flex-direction: column;
        }

        .time-input label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .time-input input {
            padding: 8px 12px;
            border: 1px solid #d0d8e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            background: white;
        }

        .time-input input:focus {
            outline: none;
            border-color: #4f9ff0;
            box-shadow: 0 0 0 3px rgba(79, 159, 240, 0.1);
        }

        .hours-display {
            background: white;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #e8eef5;
            text-align: center;
            font-weight: 600;
            color: #357abd;
            font-size: 14px;
        }

        .form-group.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .form-group.disabled .day-label {
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .btn-load {
            background: #e8eef5;
            color: #357abd;
        }

        .btn-load:active {
            background: #d0d8e0;
            transform: scale(0.98);
        }

        .btn-save {
            background: linear-gradient(to bottom, #4f9ff0, #357abd);
            color: white;
            flex: 2;
        }

        .btn-save:active {
            transform: scale(0.98);
        }

        .worker-link {
            margin-top: 16px;
            text-align: center;
        }

        .worker-link a {
            color: #4f9ff0;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .worker-link a:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">Guten Tag! 👋</div>
            <div class="header-subtitle">Bitte deine Arbeitszeiten eintragen</div>
        </div>

        <div id="form">
            <!-- Montag -->
            <div class="form-group">
                <div class="day-label">Montag</div>
                <div class="time-inputs">
                    <div class="time-input">
                        <label>Von</label>
                        <input type="time" id="mo-von" value="07:30">
                    </div>
                    <div class="time-input">
                        <label>Bis</label>
                        <input type="time" id="mo-bis" value="15:00">
                    </div>
                </div>
                <div class="time-input">
                    <label>Stunden</label>
                    <input type="number" id="mo-hours" value="7.0" step="0.1" min="0" max="12">
                </div>
            </div>

            <!-- Dienstag -->
            <div class="form-group">
                <div class="day-label">Dienstag</div>
                <div class="time-inputs">
                    <div class="time-input">
                        <label>Von</label>
                        <input type="time" id="di-von" value="10:00">
                    </div>
                    <div class="time-input">
                        <label>Bis</label>
                        <input type="time" id="di-bis" value="14:20">
                    </div>
                </div>
                <div class="time-input">
                    <label>Stunden</label>
                    <input type="number" id="di-hours" value="4.2" step="0.1" min="0" max="12">
                </div>
            </div>

            <!-- Mittwoch -->
            <div class="form-group">
                <div class="day-label">Mittwoch</div>
                <div class="time-inputs">
                    <div class="time-input">
                        <label>Von</label>
                        <input type="time" id="mi-von" value="08:00">
                    </div>
                    <div class="time-input">
                        <label>Bis</label>
                        <input type="time" id="mi-bis" value="14:20">
                    </div>
                </div>
                <div class="time-input">
                    <label>Stunden</label>
                    <input type="number" id="mi-hours" value="5.1" step="0.1" min="0" max="12">
                </div>
            </div>

            <!-- Donnerstag -->
            <div class="form-group">
                <div class="day-label">Donnerstag</div>
                <div class="time-inputs">
                    <div class="time-input">
                        <label>Von</label>
                        <input type="time" id="do-von" value="08:30">
                    </div>
                    <div class="time-input">
                        <label>Bis</label>
                        <input type="time" id="do-bis" value="16:00">
                    </div>
                </div>
                <div class="time-input">
                    <label>Stunden</label>
                    <input type="number" id="do-hours" value="8.3" step="0.1" min="0" max="12">
                </div>
                <div style="font-size: 12px; color: #666; margin-top: 8px; font-style: italic;">+ 1h Team (16:15–17:15)</div>
            </div>

            <!-- Freitag -->
            <div class="form-group">
                <div class="day-label">Freitag</div>
                <div class="time-inputs">
                    <div class="time-input">
                        <label>Von</label>
                        <input type="time" id="fr-von" value="10:00">
                    </div>
                    <div class="time-input">
                        <label>Bis</label>
                        <input type="time" id="fr-bis" value="15:00">
                    </div>
                </div>
                <div class="time-input">
                    <label>Stunden</label>
                    <input type="number" id="fr-hours" value="5.0" step="0.1" min="0" max="12">
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-load" onclick="loadDefaults()">📋 Defaults laden</button>
            <button class="btn btn-save" onclick="saveSetup()">✓ Weiter</button>
        </div>

        <div class="worker-link">
            <a href="worker.html">Oder direkt zu worker.html</a>
        </div>
    </div>

    <script>
        const dayMap = {
            'mo': { name: 'Montag', hours: 7.0 },
            'di': { name: 'Dienstag', hours: 4.2 },
            'mi': { name: 'Mittwoch', hours: 5.1 },
            'do': { name: 'Donnerstag', hours: 8.3 },
            'fr': { name: 'Freitag', hours: 5.0 }
        };

        function loadDefaults() {
            document.getElementById('mo-von').value = '07:30';
            document.getElementById('mo-bis').value = '15:00';
            document.getElementById('mo-hours').value = '7.0';
            
            document.getElementById('di-von').value = '10:00';
            document.getElementById('di-bis').value = '14:20';
            document.getElementById('di-hours').value = '4.2';
            
            document.getElementById('mi-von').value = '08:00';
            document.getElementById('mi-bis').value = '14:20';
            document.getElementById('mi-hours').value = '5.1';
            
            document.getElementById('do-von').value = '08:30';
            document.getElementById('do-bis').value = '16:00';
            document.getElementById('do-hours').value = '8.3';
            
            document.getElementById('fr-von').value = '10:00';
            document.getElementById('fr-bis').value = '15:00';
            document.getElementById('fr-hours').value = '5.0';
        }

        function saveSetup() {
            const schedule = [];
            let totalHours = 0;
            
            Object.keys(dayMap).forEach(day => {
                const von = document.getElementById(`${day}-von`).value;
                const bis = document.getElementById(`${day}-bis`).value;
                const hours = parseFloat(document.getElementById(`${day}-hours`).value) || 0;
                
                schedule.push({
                    day: dayMap[day].name,
                    von: von,
                    bis: bis
                });
                
                totalHours += hours;
            });

            // Total: 7 + 4.2 + 5.1 + 8.3 + 5 = 29.6, plus 1h Team = 30.6
            const totalWithTeam = totalHours + 1.0; // +1h Team für Donnerstag

            const userData = {
                name: 'marc_hoss',
                wochenstunden: totalWithTeam,
                schedule: schedule,
                eintraege: {},
                erstellt: new Date().toISOString()
            };

            localStorage.setItem('stundenzettel_marc_hoss', JSON.stringify(userData));
            localStorage.setItem('last_stundenzettel_user', 'marc_hoss');
            
            window.location.href = 'worker.html';
        }

        // Setup beim Start
        document.addEventListener('DOMContentLoaded', () => {
            loadDefaults();
        });
    </script>
</body>
</html>
