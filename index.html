<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Stundenzettel – RGT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Poppins',sans-serif;
  background: linear-gradient(160deg,#0d2b14 0%,#2a7a3b 60%,#3db356 100%);
  min-height:100vh; padding:24px 16px 40px;
}

.card {
  background:white; border-radius:20px;
  padding:20px; margin-bottom:14px;
  box-shadow:0 6px 24px rgba(0,0,0,0.13);
}
.card-title {
  font-size:12px; font-weight:700; letter-spacing:1.5px;
  color:#3db356; text-transform:uppercase; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}

/* USER LIST */
.user-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:13px 14px; border-radius:14px;
  background:#f5faf6; border:1.5px solid #e0f0e5;
  cursor:pointer; margin-bottom:8px;
}
.user-item:active { background:#e0f5e8; }
.user-name { font-size:15px; font-weight:700; color:#222; }
.user-meta { font-size:11px; color:#888; margin-top:2px; }
.user-saldo { font-size:13px; font-weight:700; padding:4px 10px; border-radius:10px; }
.user-saldo.pos { background:#e8f8ee; color:#27ae60; }
.user-saldo.neg { background:#fff0f0; color:#d9534f; }
.user-saldo.zero { background:#f0f0f0; color:#888; }

/* VIEWS */
.view { display:none; }
.view.active { display:block; }

/* FORM */
.form-group { margin-bottom:14px; }
.form-label { font-size:11px; font-weight:700; color:#4f9ff0; margin-bottom:5px; display:block; text-transform:uppercase; letter-spacing:0.5px; }
.form-input {
  width:100%; padding:12px 14px;
  border:1.5px solid #e8eef5; border-radius:12px;
  font-family:'Poppins',sans-serif; font-size:14px; color:#333;
}
.form-input:focus { outline:none; border-color:#4f9ff0; }

.rolle-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.rolle-btn {
  padding:12px 10px; border:2px solid #e0e0e0; background:white;
  border-radius:12px; font-size:12px; font-weight:600;
  cursor:pointer; color:#555; text-align:center;
}
.rolle-btn.selected { border-color:#3db356; background:#f0faf3; color:#27ae60; }
.rolle-btn .rolle-stunden { font-size:10px; color:#aaa; margin-top:2px; }
.rolle-btn.selected .rolle-stunden { color:#3db356; }

.zusatz-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.zusatz-btn { padding:10px; border:2px solid #e0e0e0; background:white; border-radius:10px; font-size:12px; font-weight:600; cursor:pointer; color:#555; }
.zusatz-btn.selected { border-color:#4f9ff0; background:#f0f7ff; color:#4f9ff0; }

.tage-table { width:100%; border-collapse:collapse; }
.tage-table th { font-size:10px; color:#aaa; font-weight:600; padding:5px 3px; text-align:left; }
.tage-table td { padding:4px 3px; }
.tage-table input[type=time], .tage-table input[type=number] {
  width:100%; padding:6px; border:1.5px solid #e8eef5;
  border-radius:8px; font-family:'Poppins',sans-serif; font-size:12px;
}
.tage-table input[type=number] { text-align:center; }
.tage-label { font-size:12px; font-weight:600; color:#444; }

.btn-primary {
  width:100%; padding:14px; background:linear-gradient(to right,#3db356,#27ae60);
  color:white; border:none; border-radius:14px;
  font-size:15px; font-weight:700; cursor:pointer;
  font-family:'Poppins',sans-serif; margin-top:6px;
}
.btn-secondary {
  width:100%; padding:12px; background:#f5f5f5;
  color:#666; border:none; border-radius:14px;
  font-size:13px; font-weight:600; cursor:pointer;
  font-family:'Poppins',sans-serif; margin-top:8px;
}
.btn-back {
  display:flex; align-items:center; gap:6px;
  background:none; border:none; color:white;
  font-size:14px; font-weight:600; cursor:pointer;
  font-family:'Poppins',sans-serif; padding:8px 0; margin-bottom:12px;
}

/* ADMIN GRID */
.admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.admin-card {
  background:#fafafa; border:1px solid #eee; border-radius:12px;
  padding:10px 12px; cursor:pointer;
}
.admin-card:active { background:#e8f8ee; }

/* PIN */
.pin-input {
  width:100%; padding:14px; text-align:center;
  border:2px solid #e8eef5; border-radius:12px;
  font-size:22px; font-weight:700; letter-spacing:6px;
  font-family:'Poppins',sans-serif; margin:10px 0;
}

.empty-state { text-align:center; color:#bbb; padding:20px; font-size:13px; }
</style>
</head>
<body>

<!-- HEADER -->
<div style="text-align:center;color:white;margin-bottom:20px;">
  <div style="font-size:10px;letter-spacing:3px;opacity:0.6;margin-bottom:3px;">STUNDENZETTEL</div>
  <div style="font-size:38px;font-weight:800;line-height:1.1;margin-bottom:2px;">RGT</div>
  <div style="font-size:11px;letter-spacing:1.5px;opacity:0.6;">Arnold-Janssen-Schule · Goch</div>
</div>

<!-- VIEW: STARTSEITE -->
<div class="view active" id="viewHome">
  <!-- NUTZERLISTE -->
  <div class="card">
    <div class="card-title">👤 Zum Stundenzettel</div>
    <div id="userList"><div class="empty-state">Noch keine Person registriert.</div></div>
  </div>

  <!-- BUTTONS -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
    <button onclick="showView('viewReg')" style="
      background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);
      color:white;padding:16px 10px;border-radius:16px;font-size:13px;font-weight:700;
      cursor:pointer;font-family:'Poppins',sans-serif;
      display:flex;flex-direction:column;align-items:center;gap:5px;">
      <span style="font-size:22px;">➕</span>
      <span>Neuanmeldung</span>
    </button>
    <button onclick="showView('viewAdminPin')" style="
      background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);
      color:rgba(255,255,255,0.8);padding:16px 10px;border-radius:16px;font-size:13px;font-weight:700;
      cursor:pointer;font-family:'Poppins',sans-serif;
      display:flex;flex-direction:column;align-items:center;gap:5px;">
      <span style="font-size:22px;">⚙️</span>
      <span>Admin</span>
    </button>
  </div>
</div>

<!-- VIEW: REGISTRIERUNG -->
<div class="view" id="viewReg">
  <button class="btn-back" onclick="showView('viewHome')">← Zurück</button>
  <div class="card">
    <div class="card-title">📝 Neuanmeldung</div>

    <div class="form-group">
      <label class="form-label">Vorname & Nachname</label>
      <input class="form-input" id="regName" type="text" placeholder="z.B. Max Mustermann">
    </div>

    <div class="form-group">
      <label class="form-label">Rolle</label>
      <div class="rolle-grid" id="rolleGrid">
        <button class="rolle-btn" onclick="selectRolle('erzieher')" id="rolle-erzieher">
          🧑‍🏫 Erzieher<div class="rolle-stunden">31 Std./Woche</div>
        </button>
        <button class="rolle-btn" onclick="selectRolle('ergaenzung')" id="rolle-ergaenzung">
          🤝 Ergänzungskraft<div class="rolle-stunden">15 Std./Woche</div>
        </button>
        <button class="rolle-btn" onclick="selectRolle('teamleitung')" id="rolle-teamleitung">
          🏆 Teamleitung<div class="rolle-stunden">31 + Zusatz Std.</div>
        </button>
      </div>
    </div>

    <div class="form-group" id="zusatzGroup" style="display:none;">
      <label class="form-label">Zusatzstunden</label>
      <div class="zusatz-grid">
        <button class="zusatz-btn selected" onclick="selectZusatz(0)" id="zusatz-0">keine</button>
        <button class="zusatz-btn" onclick="selectZusatz(2)" id="zusatz-2">+2 Std.</button>
        <button class="zusatz-btn" onclick="selectZusatz(5)" id="zusatz-5">+5 Std.</button>
      </div>
    </div>

    <div class="form-group" id="zeitenGroup" style="display:none;">
      <label class="form-label">Arbeitszeiten</label>
      <table class="tage-table">
        <thead><tr><th>Tag</th><th>Von</th><th>Bis</th><th>Std.</th><th>🤝</th></tr></thead>
        <tbody id="zeitenBody"></tbody>
      </table>
      <div style="font-size:11px;color:#aaa;margin-top:5px;">🤝 = Teamtag (+1h automatisch)</div>
    </div>

    <div class="form-group">
      <label class="form-label">Startsaldo (optional)</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input class="form-input" id="regSaldo" type="text" placeholder="z.B. -5 oder +3" style="flex:1;" pattern="[+-]?[0-9]*[.,]?[0-9]*">
        <span style="font-size:12px;color:#aaa;">Std.</span>
      </div>
      <div style="font-size:11px;color:#aaa;margin-top:4px;">Übertrag aus Vormonaten.</div>
    </div>

    <button class="btn-primary" onclick="doRegister()">✓ Registrieren & Starten</button>
    <button class="btn-secondary" onclick="showView('viewHome')">✕ Abbrechen</button>
  </div>
</div>

<!-- VIEW: ADMIN PIN -->
<div class="view" id="viewAdminPin">
  <button class="btn-back" onclick="showView('viewHome')">← Zurück</button>
  <div class="card">
    <div class="card-title">⚙️ Admin-Zugang</div>
    <div style="text-align:center;padding:8px 0 16px;">
      <div style="font-size:13px;color:#888;margin-bottom:8px;">PIN eingeben</div>
      <input class="pin-input" id="pinInput" type="password" maxlength="10" placeholder="···" oninput="checkPin()">
    </div>
  </div>
</div>

<!-- VIEW: ADMIN DASHBOARD -->
<div class="view" id="viewAdmin">
  <button class="btn-back" onclick="lockAdmin()">← Zurück</button>

  <!-- ÜBERSICHT ALLE MITARBEITER -->
  <div class="card">
    <div class="card-title">👥 Alle Mitarbeiter</div>
    <div class="admin-grid" id="adminUserList"></div>
    <div style="font-size:11px;color:#bbb;text-align:center;margin-top:4px;">Antippen → zum Stundenzettel</div>
  </div>

  <!-- ADMIN AKTIONEN -->
  <div class="card">
    <div class="card-title">⚙️ Admin-Aktionen</div>
    <div style="display:flex;flex-direction:column;gap:8px;">

      <button onclick="createOrShareTeamLink()" style="
        padding:13px;background:linear-gradient(135deg,#f0faf3,#e0f5e8);color:#27ae60;
        border:1.5px solid #c0e8cc;border-radius:12px;
        font-size:13px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;
        text-align:left;">
        🔗 Team-Link erstellen & teilen
      </button>

      <button onclick="loadCloudUsers()" style="
        padding:13px;background:linear-gradient(135deg,#f0f7ff,#e0eeff);color:#4f9ff0;
        border:1.5px solid #c0d8f0;border-radius:12px;
        font-size:13px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;
        text-align:left;">
        ☁️ Alle Mitarbeiter aus Cloud laden
      </button>

      <button onclick="exportAllCSV()" style="
        padding:13px;background:#f5f5f5;color:#888;
        border:1.5px solid #e0e0e0;border-radius:12px;
        font-size:13px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;
        text-align:left;">
        📊 Übersicht exportieren (CSV)
      </button>

      <button onclick="lockAdmin()" style="
        padding:13px;background:#f5f5f5;color:#aaa;
        border:1.5px solid #e0e0e0;border-radius:12px;
        font-size:13px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;
        text-align:left;">
        🔒 Admin sperren
      </button>
    </div>
  </div>
</div>

<script>
const ADMIN_PIN = 'owa';
const CLOUD_KEY = '$2a$10$/LZXkAkkscq86PkmjcvaHufucGAf00w/BzoLV3T83QaIvOqLgleX2';
const CLOUD_API = 'https://api.jsonbin.io/v3/b';

function getTeamBinId() {
  const urlParams = new URLSearchParams(window.location.search);
  const fromUrl = urlParams.get('bin');
  if (fromUrl) { localStorage.setItem('rgt_team_bin', fromUrl); return fromUrl; }
  return localStorage.getItem('rgt_team_bin');
}

async function createOrShareTeamLink() {
  let binId = getTeamBinId();
  if (!binId) {
    // Neuen Bin erstellen
    try {
      const res = await fetch(CLOUD_API, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': CLOUD_KEY,
          'X-Bin-Name': 'RGT-Stundenzettel',
          'X-Bin-Private': 'true'
        },
        body: JSON.stringify({ users: {} })
      });
      const data = await res.json();
      binId = data.metadata.id;
      localStorage.setItem('rgt_team_bin', binId);
      alert('✅ Team-Datenbank erstellt!\n\nJetzt auf "Team-Link erstellen & teilen" drücken um den Link zu verschicken!');
    } catch(e) {
      alert('❌ Fehler beim Erstellen: ' + e.message);
      return;
    }
  }
  const url = `${window.location.origin}${window.location.pathname}?bin=${binId}`;
  if (navigator.share) {
    navigator.share({
      title: 'Stundenzettel RGT – Anmeldung',
      text: 'Bitte hier anmelden für den digitalen Stundenzettel:',
      url: url
    });
  } else {
    navigator.clipboard.writeText(url);
    alert('✓ Link kopiert!\n\n' + url);
  }
}

async function loadCloudUsers() {
  const registryBin = localStorage.getItem('rgt_team_bin') || '6a3007c0f5f4af5e29f58336';
  const list = document.getElementById('adminUserList');
  list.innerHTML = '<div class="empty-state">⏳ Lade Mitarbeiter...</div>';
  try {
    // Registry lesen
    const regRes = await fetch(`${CLOUD_API}/${registryBin}/latest`, {
      headers: { 'X-Master-Key': CLOUD_KEY }
    });
    const reg = await regRes.json();
    const userBins = reg.record?.users || {};
    const keys = Object.keys(userBins);
    if (!keys.length) {
      list.innerHTML = '<div class="empty-state">Noch keine Mitarbeiter in der Cloud.<br>Alle müssen sich zuerst einloggen!</div>';
      return;
    }
    // Jeden User-Bin einzeln lesen
    const userDataList = await Promise.all(keys.map(async key => {
      try {
        const res = await fetch(`${CLOUD_API}/${userBins[key]}/latest`, {
          headers: { 'X-Master-Key': CLOUD_KEY }
        });
        const data = await res.json();
        return { key, ...data.record };
      } catch(e) { return null; }
    }));

    list.innerHTML = userDataList.filter(Boolean).map(u => {
      const saldo = u.saldo || 0;
      const sign = saldo >= 0 ? '+' : '';
      const sc = saldo > 0 ? '#27ae60' : saldo < 0 ? '#d9534f' : '#888';
      const sb = saldo > 0 ? '#f0faf3' : saldo < 0 ? '#fff1f2' : '#f5f5f5';
      const nameParts = (u.displayName||u.key).split(' ');
      const shortName = nameParts.length > 1 ? nameParts[0]+' '+nameParts[nameParts.length-1][0]+'.' : u.displayName;
      const syncTime = u.lastSync ? new Date(u.lastSync).toLocaleDateString('de-DE') : '–';
      return `<div class="admin-card" onclick="goToUser('${u.key}')">
        <div style="font-size:13px;font-weight:700;color:#333;margin-bottom:2px;">${shortName}</div>
        <div style="font-size:10px;color:#aaa;margin-bottom:6px;">${u.wochenstunden}h/W · ${u.eintraege||0} Eintr. · ${syncTime}</div>
        <div style="font-size:16px;font-weight:800;color:${sc};background:${sb};padding:4px 8px;border-radius:8px;text-align:center;">${sign}${saldo.toLocaleString('de-DE')}h</div>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty-state">❌ Fehler beim Laden. Bitte nochmal versuchen.</div>';
  }
}

const ROLLE_DEFAULTS = {
  erzieher: {
    label: 'Erzieher', wochenstunden: 31,
    schedule: [
      { day:'Montag',    von:'07:30', bis:'15:00', soll:7.0 },
      { day:'Dienstag',  von:'10:00', bis:'14:20', soll:4.2 },
      { day:'Mittwoch',  von:'08:00', bis:'13:30', soll:5.1 },
      { day:'Donnerstag',von:'08:00', bis:'17:15', soll:8.3 },
      { day:'Freitag',   von:'10:00', bis:'15:00', soll:5.0 },
    ]
  },
  ergaenzung: {
    label: 'Ergänzungskraft', wochenstunden: 15,
    schedule: [
      { day:'Montag',    von:'08:00', bis:'11:00', soll:3.0 },
      { day:'Dienstag',  von:'08:00', bis:'11:00', soll:3.0 },
      { day:'Mittwoch',  von:'08:00', bis:'11:00', soll:3.0 },
      { day:'Donnerstag',von:'08:00', bis:'11:00', soll:3.0 },
      { day:'Freitag',   von:'08:00', bis:'11:00', soll:3.0 },
    ]
  },
  teamleitung: {
    label: 'Teamleitung', wochenstunden: 31,
    schedule: [
      { day:'Montag',    von:'07:30', bis:'15:00', soll:7.0 },
      { day:'Dienstag',  von:'10:00', bis:'14:20', soll:4.2 },
      { day:'Mittwoch',  von:'08:00', bis:'13:30', soll:5.1 },
      { day:'Donnerstag',von:'08:00', bis:'17:15', soll:8.3 },
      { day:'Freitag',   von:'10:00', bis:'15:00', soll:5.0 },
    ]
  }
};

let selectedRolle = null;
let selectedZusatz = 0;

// ─── VIEWS ───────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ─── INIT ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  renderUserList();
});

// ─── USER LIST ───────────────────────────────────────────
function getAllUsers() {
  return Object.keys(localStorage)
    .filter(k => k.startsWith('stundenzettel_'))
    .map(k => JSON.parse(localStorage.getItem(k)))
    .filter(Boolean);
}

function calcSaldo(user) {
  const entries = user.eintraege || {};
  const plan = {};
  (user.schedule||[]).forEach(s => {
    const map = {Montag:1,Dienstag:2,Mittwoch:3,Donnerstag:4,Freitag:5};
    plan[map[s.day]] = s.soll || 0;
  });
  let saldo = parseFloat(user.startsaldo) || 0;
  Object.entries(entries).forEach(([ds,e]) => {
    const d = new Date(ds+'T12:00:00');
    const soll = plan[d.getDay()] || 0;
    saldo += (e.hours||0) - soll;
  });
  return Math.round(saldo*100)/100;
}

function renderUserList() {
  const users = getAllUsers();
  const list = document.getElementById('userList');
  if (!users.length) {
    list.innerHTML = '<div class="empty-state">Noch keine Person registriert.<br>Bitte unten anmelden.</div>';
    return;
  }
  list.innerHTML = users.map(u => {
    const saldo = calcSaldo(u);
    const sign = saldo > 0 ? '+' : '';
    const cls = saldo > 0 ? 'pos' : saldo < 0 ? 'neg' : 'zero';
    const dn = u.displayName || u.name.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
    const rolle = u.rolle ? ROLLE_DEFAULTS[u.rolle]?.label || '' : '';
    return `<div class="user-item" onclick="goToUser('${u.name}')">
      <div>
        <div class="user-name">${dn}</div>
        <div class="user-meta">${rolle} · ${u.wochenstunden} Std./Woche</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="user-saldo ${cls}">${sign}${saldo.toLocaleString('de-DE')}h</div>
        <div style="font-size:18px;color:#3db356;">›</div>
      </div>
    </div>`;
  }).join('');
}

function goToUser(name) {
  localStorage.setItem('last_stundenzettel_user', name);
  location.href = 'worker.html?user=' + encodeURIComponent(name);
}

// ─── ROLLE ───────────────────────────────────────────────
function selectRolle(rolle) {
  selectedRolle = rolle;
  document.querySelectorAll('.rolle-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('rolle-'+rolle).classList.add('selected');
  const isChef = rolle === 'teamleitung';
  document.getElementById('zusatzGroup').style.display = isChef ? 'block' : 'none';
  document.getElementById('zeitenGroup').style.display = 'block';
  const def = ROLLE_DEFAULTS[rolle];
  const tbody = document.getElementById('zeitenBody');
  tbody.innerHTML = def.schedule.map((s,i) => `
    <tr>
      <td class="tage-label">${s.day.substring(0,2)}</td>
      <td><input type="time" id="t${i}von" value="${s.von}"></td>
      <td><input type="time" id="t${i}bis" value="${s.bis}"></td>
      <td><input type="number" id="t${i}soll" value="${s.soll}" step="0.1" min="0" max="12"></td>
      <td style="text-align:center;">
        <input type="checkbox" id="t${i}team" style="width:18px;height:18px;cursor:pointer;" ${s.teamtag ? 'checked' : ''}>
      </td>
    </tr>`).join('');
}

function selectZusatz(h) {
  selectedZusatz = h;
  document.querySelectorAll('.zusatz-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('zusatz-'+h).classList.add('selected');
}

// ─── REGISTRIEREN ────────────────────────────────────────
function doRegister() {
  const nameRaw = document.getElementById('regName').value.trim();
  if (!nameRaw) { alert('Bitte Namen eingeben.'); return; }
  if (!selectedRolle) { alert('Bitte Rolle wählen.'); return; }
  const nameKey = nameRaw.toLowerCase().replace(/\s+/g,'_');
  const def = ROLLE_DEFAULTS[selectedRolle];
  const schedule = def.schedule.map((s,i) => ({
    day: s.day,
    von: document.getElementById('t'+i+'von')?.value || s.von,
    bis: document.getElementById('t'+i+'bis')?.value || s.bis,
    soll: parseFloat(document.getElementById('t'+i+'soll')?.value) || s.soll,
    teamtag: document.getElementById('t'+i+'team')?.checked || false,
  }));
  const totalSoll = schedule.reduce((sum,s)=>sum+s.soll, 0);
  const FESTE_STUNDEN = { erzieher: 31, teamleitung: 31, ergaenzung: 15 };
  const basis = FESTE_STUNDEN[selectedRolle] || Math.round(totalSoll*10)/10;
  const wochenstunden = basis + selectedZusatz;
  const saldoRaw = document.getElementById('regSaldo').value.replace(',','.').trim();
  const startsaldo = parseFloat(saldoRaw) || 0;
  const userData = {
    name: nameKey, displayName: nameRaw, rolle: selectedRolle,
    wochenstunden, startsaldo, schedule, eintraege: {},
    erstellt: new Date().toISOString()
  };
  localStorage.setItem('stundenzettel_'+nameKey, JSON.stringify(userData));
  localStorage.setItem('last_stundenzettel_user', nameKey);
  location.href = 'worker.html?user=' + encodeURIComponent(nameKey);
}

// ─── ADMIN ───────────────────────────────────────────────
function shareLink() {
  const url = window.location.href.split('?')[0];
  if (navigator.share) {
    navigator.share({
      title: 'Stundenzettel RGT',
      text: 'Bitte hier anmelden für den digitalen Stundenzettel:',
      url: url
    });
  } else {
    navigator.clipboard.writeText(url);
    alert('✓ Link in Zwischenablage kopiert!');
  }
}

function checkPin() {
  const val = document.getElementById('pinInput').value;
  if (val === ADMIN_PIN) {
    document.getElementById('pinInput').value = '';
    renderAdminList();
    showView('viewAdmin');
  }
}

function lockAdmin() {
  showView('viewHome');
}

function renderAdminList() {
  const users = getAllUsers();
  const container = document.getElementById('adminUserList');
  if (!users.length) {
    container.innerHTML = '<div class="empty-state">Keine Nutzer vorhanden.</div>';
    return;
  }
  container.innerHTML = users.map(u => {
    const dn = u.displayName || u.name.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
    const saldo = calcSaldo(u);
    const sign = saldo >= 0 ? '+' : '';
    const sc = saldo > 0 ? '#27ae60' : saldo < 0 ? '#d9534f' : '#888';
    const sb = saldo > 0 ? '#f0faf3' : saldo < 0 ? '#fff1f2' : '#f5f5f5';
    const nameParts = dn.split(' ');
    const shortName = nameParts.length > 1 ? nameParts[0]+' '+nameParts[nameParts.length-1][0]+'.' : dn;
    const eintrCount = Object.keys(u.eintraege||{}).length;
    return `<div class="admin-card" onclick="goToUser('${u.name}')">
      <div style="font-size:13px;font-weight:700;color:#333;margin-bottom:2px;">${shortName}</div>
      <div style="font-size:10px;color:#aaa;margin-bottom:6px;">${u.wochenstunden}h/W · ${eintrCount} Eintr.</div>
      <div style="font-size:16px;font-weight:800;color:${sc};background:${sb};padding:4px 8px;border-radius:8px;text-align:center;margin-bottom:6px;">${sign}${saldo.toLocaleString('de-DE')}h</div>
      <button onclick="event.stopPropagation();deleteUser('${u.name}')" style="font-size:10px;color:#d9534f;background:none;border:none;cursor:pointer;padding:0;">🗑 löschen</button>
    </div>`;
  }).join('');
}

function deleteUser(name) {
  const dn = name.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ');
  if (!confirm(`${dn} wirklich löschen? Alle Daten gehen verloren.`)) return;
  localStorage.removeItem('stundenzettel_'+name);
  if (localStorage.getItem('last_stundenzettel_user') === name)
    localStorage.removeItem('last_stundenzettel_user');
  renderAdminList();
  renderUserList();
}

function exportAllCSV() {
  const users = getAllUsers();
  if (!users.length) { alert('Keine Daten vorhanden.'); return; }
  let csv = 'Name;Rolle;Std./Woche;Saldo\n';
  users.forEach(u => {
    const dn = u.displayName || u.name;
    const rolle = ROLLE_DEFAULTS[u.rolle]?.label || u.rolle || '';
    const saldo = calcSaldo(u);
    csv += `${dn};${rolle};${u.wochenstunden};${saldo}\n`;
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'stundenzettel_uebersicht.csv';
  a.click();
}
</script>
