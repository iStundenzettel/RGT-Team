<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stundenzettel">
    <title>Stundenzettel</title>
    <style>
        :root {
            --dark: #0d2b14;
            --mid: #1a5c2a;
            --grn: #2e9e4f;
            --lime: #6deb6d;
            --bg: #7aaa7a;
            --card: #ffffff;
            --txt: #0d1f10;
            --sub: #5a7a5e;
            --red: #d93025;
            --grn-light: #d4f5d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--txt);
            padding-bottom: 20px;
        }
        
        /* HEADER */
        .header {
            background: linear-gradient(to bottom, var(--dark) 0%, var(--mid) 30%, var(--grn) 65%, transparent 100%);
            padding: 20px 20px 40px;
            text-align: center;
            color: white;
        }
        .header-app {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .header-name {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 12px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }
        .header-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .header-saldo {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 99px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.25);
        }
        
        /* CONTENT */
        .container {
            padding: 0 16px;
        }
        .month-section {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .month-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark);
            padding: 12px;
            background: var(--grn-light);
            border-radius: 10px;
            margin-bottom: 12px;
            text-align: center;
        }
        .week-section {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .week-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 12px;
            padding: 8px 12px;
            background: white;
            border-radius: 8px;
        }
        .day-entry {
            background: white;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--grn);
        }
        .day-info {
            flex: 1;
        }
        .day-label {
            font-weight: 700;
            font-size: 14px;
            color: var(--txt);
        }
        .day-date {
            font-size: 12px;
            color: var(--sub);
            margin-bottom: 2px;
        }
        .day-time {
            font-size: 13px;
            color: var(--sub);
        }
        .day-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--grn);
            min-width: 60px;
            text-align: right;
            margin-right: 12px;
        }
        .day-controls {
            display: flex;
            gap: 6px;
        }
        .btn-ctrl {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: 700;
        }
        .btn-minus {
            background: #ffebee;
            color: var(--red);
        }
        .btn-minus:active {
            background: #ffcdd2;
        }
        .btn-plus {
            background: var(--grn-light);
            color: var(--grn);
        }
        .btn-plus:active {
            background: #b3e5b3;
        }
        
        /* FOOTER BUTTONS */
        .footer {
            display: flex;
            gap: 10px;
            padding: 16px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-janine {
            background: #e91e63;
            color: white;
        }
        .btn-janine:active {
            background: #c2185b;
        }
        .btn-teilen {
            background: var(--grn);
            color: white;
            flex: 2;
        }
        .btn-teilen:active {
            background: #1a5c2a;
        }
        .btn-save {
            background: var(--grn);
            color: white;
            flex: 1;
        }
        .btn-print {
            background: var(--grn);
            color: white;
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-app">STUNDENZETTEL</div>
        <div class="header-name" id="userName">Mitarbeiter</div>
        <div class="header-info">
            <div id="weekHours">31 Std. / Woche</div>
            <div class="header-saldo" id="saldo">Saldo: +0,00h</div>
        </div>
    </div>

    <div class="container" id="content"></div>

    <div class="footer">
        <button class="btn btn-janine" onclick="saveJanine()">👤 Janine</button>
        <button class="btn btn-teilen" onclick="openShare()">📤 Teilen</button>
        <button class="btn btn-save" onclick="save()">💾</button>
        <button class="btn btn-print" onclick="print()">🖨️</button>
    </div>

    <script>
        // ============= GLOBALS =============
        let PLAN = {};
        let userData = null;
        let entries = {}; // { "2026-06-03": 7.5, ... }

        // ============= LOAD DATA =============
        function init() {
            // Lade letzten Mitarbeiter
            const names = Object.keys(localStorage).filter(k => k.startsWith('stundenzettel_'));
            if (names.length === 0) {
                window.location.href = 'index.html';
                return;
            }

            userData = JSON.parse(localStorage.getItem(names[names.length - 1]));
            entries = userData.eintraege || {};
            
            // Baue PLAN aus eingegebenen Daten
            buildPlan();
            
            // Zeige Daten
            const displayName = userData.name
                .split('_')
                .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
                .join(' ');
            
            document.getElementById('userName').textContent = displayName;
            document.getElementById('weekHours').textContent = userData.wochenstunden + ' Std. / Woche';
            
            // TODO: Saldo vom Vormonat laden (für jetzt: 0)
            document.getElementById('saldo').textContent = 'Saldo: +0,00h';
            
            renderContent();
        }

        function buildPlan() {
            const dayMap = { 'Montag': 1, 'Dienstag': 2, 'Mittwoch': 3, 'Donnerstag': 4, 'Freitag': 5 };
            PLAN = {};
            
            userData.schedule.forEach(item => {
                const dow = dayMap[item.day];
                if (dow) {
                    const [vonH, vonM] = (item.von || '08:00').split(':').map(Number);
                    const [bisH, bisM] = (item.bis || '15:00').split(':').map(Number);
                    const vonDec = vonH + vonM / 60;
                    const bisDec = bisH + bisM / 60;
                    const soll = Math.round((bisDec - vonDec - 0.5) * 100) / 100;
                    
                    PLAN[dow] = {
                        day: item.day,
                        von: item.von,
                        bis: item.bis,
                        soll: Math.max(0, soll),
                        team: item.team || false
                    };
                }
            });
        }

        function renderContent() {
            const months = {};
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            // Sammle Einträge nach Monat
            Object.entries(entries).forEach(([dateStr, hours]) => {
                const date = new Date(dateStr);
                const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                if (!months[key]) months[key] = [];
                months[key].push({ date: dateStr, hours, dow: date.getDay() });
            });

            // Generiere Wochen aus PLAN (auch ohne Einträge)
            const allDates = new Set(Object.keys(entries));
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            
            for (let d = new Date(firstDay); d <= lastDay; d.setDate(d.getDate() + 1)) {
                const dateStr = d.toISOString().split('T')[0];
                if (!allDates.has(dateStr)) {
                    allDates.add(dateStr);
                    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    if (!months[key]) months[key] = [];
                    months[key].push({ date: dateStr, hours: 0, dow: d.getDay() });
                }
            }

            let html = '';
            
            // Render nach Monat
            Object.keys(months).sort().reverse().forEach(monthKey => {
                const [year, month] = monthKey.split('-');
                const monthDate = new Date(year, parseInt(month) - 1);
                const monthName = monthDate.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
                
                html += `<div class="month-section">
                    <div class="month-title">${monthName}</div>`;
                
                // Gruppiere nach Woche
                const weeks = {};
                months[monthKey].forEach(entry => {
                    const date = new Date(entry.date);
                    const weekStart = new Date(date);
                    weekStart.setDate(date.getDate() - date.getDay() + 1); // Mo
                    const weekKey = weekStart.toISOString().split('T')[0];
                    
                    if (!weeks[weekKey]) weeks[weekKey] = [];
                    weeks[weekKey].push(entry);
                });
                
                // Render Wochen
                Object.keys(weeks).sort().forEach(weekKey => {
                    const weekStart = new Date(weekKey);
                    const weekNum = Math.ceil((weekStart.getDate() + new Date(weekStart.getFullYear(), weekStart.getMonth(), 1).getDay()) / 7);
                    
                    html += `<div class="week-section">
                        <div class="week-title">KW ${String(weekNum).padStart(2, '0')}</div>`;
                    
                    weeks[weekKey].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(entry => {
                        const date = new Date(entry.date);
                        const dayName = date.toLocaleDateString('de-DE', { weekday: 'short' });
                        const dayNum = String(date.getDate()).padStart(2, '0');
                        const dow = date.getDay();
                        const planDay = PLAN[dow] || PLAN[dow === 0 ? 7 : dow];
                        const time = planDay ? `${planDay.von}–${planDay.bis}` : '–:–';
                        
                        html += `<div class="day-entry">
                            <div class="day-info">
                                <div class="day-label">${dayName}</div>
                                <div class="day-date">${dayNum}.${String(date.getMonth() + 1).padStart(2, '0')}.</div>
                                <div class="day-time">${time}</div>
                            </div>
                            <div class="day-value" id="val-${entry.date}">${formatHours(entry.hours)}</div>
                            <div class="day-controls">
                                <button class="btn-ctrl btn-minus" onclick="addHours('${entry.date}', -0.25)">−</button>
                                <button class="btn-ctrl btn-plus" onclick="addHours('${entry.date}', +0.25)">+</button>
                            </div>
                        </div>`;
                    });
                    
                    html += `</div>`;
                });
                
                html += `</div>`;
            });
            
            document.getElementById('content').innerHTML = html;
        }

        function formatHours(h) {
            const sign = h < 0 ? '−' : '+';
            const abs = Math.abs(h);
            const hours = Math.floor(abs);
            const mins = Math.round((abs - hours) * 60);
            return `${sign}${hours},${String(mins).padStart(2, '0')}`;
        }

        function addHours(dateStr, delta) {
            if (!entries[dateStr]) entries[dateStr] = 0;
            entries[dateStr] = Math.round((entries[dateStr] + delta) * 100) / 100;
            document.getElementById(`val-${dateStr}`).textContent = formatHours(entries[dateStr]);
        }

        function save() {
            userData.eintraege = entries;
            const key = `stundenzettel_${userData.name.toUpperCase()}`;
            localStorage.setItem(key, JSON.stringify(userData));
            alert('✓ Gespeichert!');
        }

        function openShare() {
            const text = `Stundenzettel ${new Date().toLocaleDateString('de-DE', { month: 'long', year: 'numeric' })}:\n${Object.entries(entries).map(([d, h]) => `${d}: ${formatHours(h)}`).join('\n')}`;
            
            if (navigator.share) {
                navigator.share({ title: 'Stundenzettel', text });
            } else {
                alert('Teilen nicht unterstützt. Text: \n' + text);
            }
        }

        function saveJanine() {
            alert('👍 Janine hat\'s bekommen!\n\nWird zum Dashboard weitergeleitet...');
            const janinData = {
                name: 'Janine',
                wochenstunden: 31,
                schedule: [
                    {day: 'Montag', von: '08:00', bis: '15:00', team: false},
                    {day: 'Dienstag', von: '08:00', bis: '15:00', team: false},
                    {day: 'Mittwoch', von: '08:00', bis: '15:00', team: false},
                    {day: 'Donnerstag', von: '08:00', bis: '15:00', team: false},
                    {day: 'Freitag', von: '08:00', bis: '15:00', team: false}
                ],
                eintraege: {},
                erstellt: new Date().toISOString()
            };
            localStorage.setItem('stundenzettel_JANINE', JSON.stringify(janinData));
            sessionStorage.setItem('admin_authenticated', 'true');
            window.location.href = 'dashboard.html';
        }

        function print() {
            window.print();
        }

        // INIT
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
