<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="cache-control" content="no-cache, no-store, must-revalidate">
    <title>Stundenzettel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0d2b14 0%, #3db356 100%);
            min-height: 100vh;
            padding: 20px 0 100px 0;
        }

        .header {
            text-align: center;
            color: white;
            padding: 20px;
            margin-bottom: 10px;
        }

        .header-name {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header-org {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .header-stats {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .card {
            background: white;
            margin: 16px;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .today-badge {
            background: #3db356;
            color: white;
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .today-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .today-date {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .today-time {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }

        .today-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .today-hours {
            font-size: 48px;
            font-weight: 700;
            color: #3db356;
            line-height: 1;
        }

        .today-hours-label {
            font-size: 14px;
            color: #999;
            margin-top: 4px;
        }

        .button-group {
            display: flex;
            gap: 16px;
        }

        .btn-ctrl {
            width: 64px;
            height: 64px;
            border: none;
            border-radius: 50%;
            font-size: 32px;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-minus {
            background: #ffcccc;
            color: #d9534f;
        }

        .btn-minus:active {
            transform: scale(0.95);
            box-shadow: 0 4px 12px rgba(217, 83, 79, 0.3);
        }

        .btn-plus {
            background: #ccf0dd;
            color: #3db356;
        }

        .btn-plus:active {
            transform: scale(0.95);
            box-shadow: 0 4px 12px rgba(61, 179, 86, 0.3);
        }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #3db356, #2ba845);
            transition: width 0.3s;
        }

        .status-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .btn-status {
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #333;
        }

        .btn-status.active {
            border-color: #3db356;
            background: #f0f9f4;
            color: #3db356;
        }

        .next-appointment {
            background: linear-gradient(135deg, #2b5a3b 0%, #3db356 100%);
            color: white;
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
        }

        .next-appointment-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .next-appointment-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .next-appointment-date {
            font-size: 14px;
        }

        .next-appointment-name {
            font-size: 16px;
            font-weight: 700;
            margin-top: 4px;
        }

        .next-appointment-countdown {
            font-size: 12px;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 12px;
        }

        .notes-section {
            margin-top: 20px;
        }

        .notes-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .notes-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
        }

        .notes-input::placeholder {
            color: #ccc;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            background: linear-gradient(to top, #0d2b14 80%, rgba(13, 43, 20, 0.8));
            padding: 16px 0 20px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-footer {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
            background: rgba(61, 179, 86, 0.3);
            color: white;
            transition: all 0.2s;
        }

        .btn-footer:active {
            background: rgba(61, 179, 86, 0.5);
            transform: scale(0.95);
        }

        .save-indicator {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #3db356;
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .save-indicator.show {
            opacity: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
        }

        .modal.open {
            display: flex;
            align-items: flex-end;
        }

        .modal-content {
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
        }

        .modal-close {
            background: #f0f0f0;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .month-nav-btn {
            background: #f0f0f0;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month-title {
            font-size: 20px;
            font-weight: 700;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 13px;
            color: #999;
            font-weight: 600;
            padding: 8px 0;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            font-size: 17px;
            font-weight: 600;
            transition: all 0.15s;
            min-height: 52px;
        }

        .calendar-day:active {
            transform: scale(0.9);
            background: #e0f5e8;
        }

        .calendar-day.today {
            background: #3db356;
            color: white;
        }

        .calendar-day.selected {
            border: 3px solid #3db356;
            color: #3db356;
        }

        .calendar-day.has-entry {
            position: relative;
        }

        .calendar-day.has-entry::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 6px;
            height: 6px;
            background: #3db356;
            border-radius: 50%;
        }

        .btn-heute {
            width: 100%;
            padding: 14px;
            background: #3db356;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-name" id="userName">Marc Hoss</div>
        <div class="header-org">RGT · AWO</div>
        <div class="header-stats">
            <div class="stat-badge" id="weekHours">31 Std. / Woche</div>
            <div class="stat-badge" id="saldoBadge">Saldo: +0,00h</div>
        </div>
    </div>

    <div id="mainContent">
        <!-- HEUTE Card -->
        <div class="card">
            <div class="today-badge">HEUTE</div>
            <div class="today-header">
                <div>
                    <div class="today-date" id="todayDay">Mi, 3. Juni</div>
                    <div class="today-time" id="todayTime">8:00–13:30</div>
                </div>
            </div>

            <div class="today-main">
                <div>
                    <div class="today-hours" id="todayHours">5,30</div>
                    <div class="today-hours-label">Std.</div>
                </div>
                <div class="button-group">
                    <button class="btn-ctrl btn-minus" onclick="addHours(-0.5)">−</button>
                    <button class="btn-ctrl btn-plus" onclick="addHours(+0.5)">+</button>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 50%"></div>
            </div>

            <div class="status-buttons">
                <button class="btn-status active" onclick="setStatus('normal')" id="btn-normal">✓ Normal</button>
                <button class="btn-status" onclick="setStatus('frei')" id="btn-frei">⭐ Frei</button>
                <button class="btn-status" onclick="setStatus('krank')" id="btn-krank">😷 Krank</button>
                <button class="btn-status" onclick="setStatus('schule')" id="btn-schule">🚫 Schule</button>
            </div>

            <div class="next-appointment">
                <div class="next-appointment-label">📅 NÄCHSTER TERMIN</div>
                <div class="next-appointment-content">
                    <div>
                        <div class="next-appointment-date" id="nextDate">11. Juni 2026</div>
                        <div class="next-appointment-name" id="nextName">Annika</div>
                    </div>
                    <div class="next-appointment-countdown" id="nextCountdown">in 8 Tagen</div>
                </div>
            </div>

            <div class="notes-section">
                <div class="notes-label">📝 BEMERKUNGEN</div>
                <textarea class="notes-input" id="notesInput" placeholder="Notizen zu diesem Tag..." onchange="saveNotes()"></textarea>
            </div>
        </div>
    </div>

    <div id="calendarModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Kalender</div>
                <button class="modal-close" onclick="closeCalendar()">×</button>
            </div>
            <div class="month-nav">
                <button class="month-nav-btn" onclick="prevMonth()">‹</button>
                <div class="month-title" id="monthTitle">Juni 2026</div>
                <button class="month-nav-btn" onclick="nextMonth()">›</button>
            </div>
            <div class="calendar-header">
                <div class="calendar-day-header">Mo</div>
                <div class="calendar-day-header">Di</div>
                <div class="calendar-day-header">Mi</div>
                <div class="calendar-day-header">Do</div>
                <div class="calendar-day-header">Fr</div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <button class="btn-heute" onclick="goToToday()">↩ Zurück zu Heute</button>
        </div>
    </div>

    <div class="footer">
        <button class="btn-footer" onclick="openCalendar()">📅</button>
        <button class="btn-footer" onclick="saveJanine()">✉️</button>
        <button class="btn-footer" onclick="openShare()">📤</button>
        <button class="btn-footer" onclick="manualSave()">💾</button>
    </div>

    <div class="save-indicator" id="saveIndicator">Gespeichert ✓</div>

    <script>
        let userData = null;
        let entries = {};
        let PLAN = {};
        let selectedDate = new Date();
        let calendarDate = new Date();
        let todayValue = 0;
        let saveTimeout = null;

        function init() {
            let userName = localStorage.getItem('last_stundenzettel_user');
            
            if (!userName) {
                const names = Object.keys(localStorage).filter(k => k.startsWith('stundenzettel_'));
                if (names.length === 0) {
                    window.location.href = 'index.html';
                    return;
                }
                userName = names[names.length - 1].replace('stundenzettel_', '');
            }

            userData = JSON.parse(localStorage.getItem(`stundenzettel_${userName}`));
            if (!userData) {
                window.location.href = 'index.html';
                return;
            }
            
            entries = userData.eintraege || {};
            buildPlan();
            
            const displayName = userData.name
                .split('_')
                .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
                .join(' ');
            
            document.getElementById('userName').textContent = displayName;
            const weekHours = Math.round(userData.wochenstunden * 10) / 10;
            document.getElementById('weekHours').textContent = weekHours.toLocaleString('de-DE') + ' Std. / Woche';
            
            selectedDate = new Date();
            calendarDate = new Date();
            render();
        }

        function buildPlan() {
            const dayMap = { 'Montag': 1, 'Dienstag': 2, 'Mittwoch': 3, 'Donnerstag': 4, 'Freitag': 5 };
            PLAN = {};
            
            userData.schedule.forEach(item => {
                const dow = dayMap[item.day];
                if (dow) {
                    PLAN[dow] = {
                        day: item.day,
                        von: item.von || '08:00',
                        bis: item.bis || '15:00',
                        soll: item.soll || 0
                    };
                }
            });
        }

        function calculateSaldo() {
            let total = 0;
            for (const dateStr in entries) {
                const entry = entries[dateStr];
                const date = new Date(dateStr + 'T00:00:00');
                const dayOfWeek = date.getDay();
                const planDay = PLAN[dayOfWeek] || PLAN[dayOfWeek === 0 ? 7 : dayOfWeek];
                const soll = planDay ? planDay.soll : 0;
                
                // Berechne Differenz: Aktuell - Soll
                let diff = entry.hours || 0;
                
                // Wenn Status "Schule" oder "Frei", dann ist es Minus (keine Arbeit)
                // Aber wir verwenden die absolute Differenz
                if (entry.status === 'schule' || entry.status === 'frei') {
                    diff = -Math.abs(diff - soll);
                } else {
                    diff = diff - soll;
                }
                
                total += diff;
            }
            return Math.round(total * 100) / 100;
        }

        function updateSaldo() {
            const saldo = calculateSaldo();
            const sign = saldo >= 0 ? '+' : '';
            document.getElementById('saldoBadge').textContent = `Saldo: ${sign}${saldo.toLocaleString('de-DE')}h`;
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function renderToday() {
            const dateStr = formatDate(selectedDate);
            const dayOfWeek = selectedDate.getDay();
            const planDay = PLAN[dayOfWeek] || PLAN[dayOfWeek === 0 ? 7 : dayOfWeek];
            
            const dayName = selectedDate.toLocaleDateString('de-DE', { weekday: 'short' });
            const dayNum = selectedDate.getDate();
            const monthName = selectedDate.toLocaleDateString('de-DE', { month: 'long' });
            
            document.getElementById('todayDay').textContent = `${dayName.charAt(0).toUpperCase() + dayName.slice(1)}, ${dayNum}. ${monthName}`;
            
            if (planDay) {
                document.getElementById('todayTime').textContent = `${planDay.von}–${planDay.bis}`;
                todayValue = planDay.soll;
            } else {
                document.getElementById('todayTime').textContent = '–:–';
                todayValue = 0;
            }

            if (!entries[dateStr]) {
                entries[dateStr] = { hours: todayValue, status: 'normal', notes: '' };
            }

            const entry = entries[dateStr];
            todayValue = entry.hours !== undefined ? entry.hours : todayValue;
            
            updateTodayDisplay();
            updateStatusButtons(entry.status || 'normal');
            document.getElementById('notesInput').value = entry.notes || '';
        }

        function updateTodayDisplay() {
            const sign = todayValue < 0 ? '−' : '';
            const abs = Math.abs(todayValue);
            const hours = Math.floor(abs);
            const mins = Math.round((abs - hours) * 60);
            
            document.getElementById('todayHours').textContent = `${sign}${hours},${String(mins).padStart(2, '0')}`;
            
            const maxHours = userData.wochenstunden / 5;
            const percent = Math.min(100, (todayValue / maxHours) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function addHours(delta) {
            todayValue = Math.round((todayValue + delta) * 100) / 100;
            updateTodayDisplay();
            saveEntry();
            autoSave();
        }

        function setStatus(status) {
            const dateStr = formatDate(selectedDate);
            const dayOfWeek = selectedDate.getDay();
            const planDay = PLAN[dayOfWeek];
            const sollStunden = planDay ? planDay.soll : 0;

            if (!entries[dateStr]) entries[dateStr] = { hours: sollStunden, status: 'normal', notes: '' };
            
            entries[dateStr].status = status;

            if (status === 'schule' || status === 'frei') {
                todayValue = -Math.abs(sollStunden);
            } else {
                todayValue = Math.abs(sollStunden);
            }

            entries[dateStr].hours = todayValue;
            updateTodayDisplay();
            updateStatusButtons(status);
            saveEntry();
            autoSave();
        }

        function updateStatusButtons(status) {
            document.getElementById('btn-normal').classList.toggle('active', status === 'normal');
            document.getElementById('btn-frei').classList.toggle('active', status === 'frei');
            document.getElementById('btn-krank').classList.toggle('active', status === 'krank');
            document.getElementById('btn-schule').classList.toggle('active', status === 'schule');
        }

        function saveNotes() {
            const dateStr = formatDate(selectedDate);
            if (!entries[dateStr]) entries[dateStr] = { hours: todayValue, status: 'normal', notes: '' };
            entries[dateStr].notes = document.getElementById('notesInput').value;
            saveEntry();
            autoSave();
        }

        function saveEntry() {
            const dateStr = formatDate(selectedDate);
            entries[dateStr] = entries[dateStr] || { hours: todayValue, status: 'normal', notes: '' };
            entries[dateStr].hours = todayValue;
        }

        function autoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                userData.eintraege = entries;
                const key = `stundenzettel_${userData.name}`;
                localStorage.setItem(key, JSON.stringify(userData));
                showSaveIndicator();
                updateSaldo();
            }, 500);
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('show');
            setTimeout(() => {
                indicator.classList.remove('show');
            }, 2000);
        }

        function manualSave() {
            userData.eintraege = entries;
            const key = `stundenzettel_${userData.name}`;
            localStorage.setItem(key, JSON.stringify(userData));
            showSaveIndicator();
            updateSaldo();
        }

        function openCalendar() {
            calendarDate = new Date(selectedDate);
            renderCalendar();
            document.getElementById('calendarModal').classList.add('open');
        }

        function closeCalendar() {
            document.getElementById('calendarModal').classList.remove('open');
        }

        function renderCalendar() {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            
            document.getElementById('monthTitle').textContent = 
                calendarDate.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - (firstDay.getDay() || 7) + 1);
            
            let html = '';
            for (let i = 0; i < 35; i++) {
                const date = new Date(startDate);
                date.setDate(date.getDate() + i);
                
                const isThisMonth = date.getMonth() === month;
                const isToday = formatDate(date) === formatDate(new Date());
                const isSelected = formatDate(date) === formatDate(selectedDate);
                
                html += `<div class="calendar-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}" 
                    onclick="selectDateAndClose(${date.getFullYear()}, ${date.getMonth()}, ${date.getDate()})"
                    style="${!isThisMonth ? 'opacity: 0.3;' : ''}">
                    ${date.getDate()}
                </div>`;
            }
            
            document.getElementById('calendarGrid').innerHTML = html;
        }

        function selectDateAndClose(year, month, day) {
            selectedDate = new Date(year, month, day);
            closeCalendar();
            render();
        }

        function prevMonth() {
            calendarDate.setMonth(calendarDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            calendarDate.setMonth(calendarDate.getMonth() + 1);
            renderCalendar();
        }

        function saveJanine() {
            const dateStr = formatDate(selectedDate);
            const entry = entries[dateStr] || { hours: 0, status: 'normal', notes: '' };
            const msg = `${formatDate(selectedDate)}: ${entry.hours}h (${entry.status})\n${entry.notes}`;
            alert('An Janine:\n\n' + msg);
        }

        function openShare() {
            const dateStr = formatDate(selectedDate);
            const entry = entries[dateStr] || { hours: 0, status: 'normal', notes: '' };
            const msg = `Stundenzettel ${formatDate(selectedDate)}: ${entry.hours}h`;
            
            if (navigator.share) {
                navigator.share({ title: 'Stundenzettel', text: msg });
            } else {
                alert('Teilen: ' + msg);
            }
        }

        function goToToday() {
            selectedDate = new Date();
            closeCalendar();
            render();
        }

        function render() {
            renderToday();
