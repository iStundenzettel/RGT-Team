<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stundenzettel">
    <title>Stundenzettel</title>
    <style>
        :root {
            --dark: #0d2b14;
            --mid: #1a5c2a;
            --grn: #2e9e4f;
            --lime: #6deb6d;
            --bg: #7aaa7a;
            --card: #ffffff;
            --txt: #0d1f10;
            --sub: #5a7a5e;
            --red: #d93025;
            --grn-light: #d4f5d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--txt);
            padding: 0;
            padding-bottom: 120px;
        }
        
        /* HEADER */
        .header {
            background: linear-gradient(to bottom, var(--dark) 0%, var(--mid) 30%, var(--grn) 65%, transparent 100%);
            padding: 20px 20px 30px;
            text-align: center;
            color: white;
            position: relative;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .btn-back {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }
        .btn-back:active {
            background: rgba(255,255,255,0.3);
        }
        .save-indicator {
            background: rgba(255,255,255,0.9);
            color: var(--grn);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .save-indicator.show {
            opacity: 1;
        }
        
        .header-app {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .header-name {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 8px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }
        .header-info {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 12px;
            opacity: 0.85;
            flex-wrap: wrap;
        }
        .header-badge {
            background: rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 99px;
            border: 1px solid rgba(255,255,255,0.25);
        }
        
        /* CONTENT */
        .container {
            padding: 0 16px;
        }
        
        /* HEUTE CARD */
        .today-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .today-label {
            background: var(--grn);
            color: white;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .today-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .today-dayinfo {
            flex: 1;
        }
        .today-day {
            font-size: 18px;
            font-weight: 700;
            color: var(--txt);
        }
        .today-time {
            font-size: 14px;
            color: var(--sub);
            margin-top: 2px;
        }
        .today-hours-display {
            text-align: right;
        }
        .today-hours {
            font-size: 52px;
            font-weight: 900;
            color: var(--grn);
            line-height: 1;
        }
        .today-hours-label {
            font-size: 14px;
            color: var(--sub);
            margin-top: 2px;
        }
        
        /* PROGRESS BAR */
        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: var(--grn);
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        /* CONTROLS */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .controls > div {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        .btn-ctrl {
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-minus {
            background: #ffcdd2;
            color: var(--red);
        }
        .btn-minus:active {
            background: #ef9a9a;
            transform: scale(0.95);
        }
        .btn-plus {
            background: var(--grn-light);
            color: var(--grn);
        }
        .btn-plus:active {
            background: #a8e6a8;
            transform: scale(0.95);
        }
        
        /* STATUS BUTTONS - IN EINER LINIE */
        .status-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-status {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            color: var(--txt);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 70px;
            text-align: center;
        }
        .btn-status:active {
            background: var(--grn-light);
            border-color: var(--grn);
        }
        .btn-status.active {
            background: var(--grn-light);
            border-color: var(--grn);
        }
        
        /* BEMERKUNGEN */
        .notes-section {
            margin-bottom: 16px;
        }
        .notes-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--sub);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .notes-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            color: var(--txt);
            resize: none;
            height: 60px;
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal.open {
            display: flex;
            align-items: flex-end;
        }
        .modal-content {
            background: white;
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--txt);
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--sub);
        }
        
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            margin-bottom: 20px;
            background: #f9f9f9;
            border-radius: 12px;
            padding-left: 12px;
            padding-right: 12px;
        }
        .month-nav-btn {
            background: var(--grn);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }
        .month-nav-btn:active {
            background: var(--mid);
        }
        .month-title {
            font-size: 18px;
            font-weight: 700;
            flex: 1;
            text-align: center;
        }
        
        .calendar-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        .calendar-day-header {
            text-align: center;
            font-weight: 700;
            font-size: 12px;
            color: var(--sub);
            padding: 8px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 14px;
        }
        .calendar-day:active {
            border-color: #333;
        }
        .calendar-day.other-month {
            opacity: 0.3;
            cursor: default;
        }
        .calendar-day-num {
            font-size: 16px;
            font-weight: 700;
        }
        .calendar-day-value {
            font-size: 11px;
            margin-top: 2px;
        }
        
        /* FOOTER */
        .footer {
            display: flex;
            gap: 10px;
            padding: 16px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        .btn-footer {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-kalender {
            background: var(--grn);
            color: white;
        }
        .btn-janine {
            background: #e91e63;
            color: white;
            flex: 0.4;
            font-size: 20px;
        }
        .btn-teilen {
            background: var(--grn);
            color: white;
        }
        .btn-save {
            background: var(--grn);
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <button class="btn-back" onclick="backToToday()" title="Zurück zu heute">🏠</button>
            <div style="flex: 1;"></div>
            <div class="save-indicator" id="saveIndicator">✓ Gespeichert</div>
        </div>
        
        <div class="header-app">STUNDENZETTEL</div>
        <div class="header-name" id="userName">Mitarbeiter</div>
        <div class="header-info">
            <div class="header-badge" id="weekHours">31 Std. / Woche</div>
            <div class="header-badge" id="saldo">Saldo: +0,00h</div>
        </div>
    </div>

    <div class="container">
        <div class="today-card">
            <div class="today-label">HEUTE</div>
            
            <div class="today-header">
                <div class="today-dayinfo">
                    <div class="today-day" id="todayDay">Mi, 3. Juni</div>
                    <div class="today-time" id="todayTime">8:00–13:30</div>
                </div>
                <div class="today-hours-display">
                    <div class="today-hours" id="todayHours">5,30</div>
                    <div class="today-hours-label">Std.</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 50%"></div>
            </div>

            <div class="controls">
                <div class="change-indicator" id="changeIndicator" style="text-align: center; font-size: 12px; color: #666; margin-bottom: 8px; height: 20px;"></div>
                <button class="btn-ctrl btn-minus" onclick="addHours(-0.5)">−</button>
                <button class="btn-ctrl btn-plus" onclick="addHours(+0.5)">+</button>
            </div>

            <div class="status-buttons">
                <button class="btn-status active" onclick="setStatus('normal')" id="btn-normal">✓ Normal</button>
                <button class="btn-status" onclick="setStatus('frei')" id="btn-frei">⭐ Frei</button>
                <button class="btn-status" onclick="setStatus('krank')" id="btn-krank">😷 Krank</button>
                <button class="btn-status" onclick="setStatus('schule')" id="btn-schule">🚫 Schule</button>
            </div>

            <div class="notes-section">
                <div class="notes-label">Bemerkungen</div>
                <textarea class="notes-input" id="notesInput" placeholder="Notizen zu diesem Tag..." onchange="saveNotes()"></textarea>
            </div>
        </div>
    </div>

    <!-- KALENDER MODAL -->
    <div class="modal" id="calendarModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Kalender</div>
                <button class="modal-close" onclick="closeCalendar()">×</button>
            </div>

            <div class="month-nav">
                <button class="month-nav-btn" onclick="prevMonth()">‹</button>
                <div class="month-title" id="monthTitle">Juni 2026</div>
                <button class="month-nav-btn" onclick="nextMonth()">›</button>
            </div>

            <div class="calendar-header">
                <div class="calendar-day-header">Mo</div>
                <div class="calendar-day-header">Di</div>
                <div class="calendar-day-header">Mi</div>
                <div class="calendar-day-header">Do</div>
                <div class="calendar-day-header">Fr</div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <div class="footer">
        <button class="btn-footer btn-kalender" onclick="openCalendar()">📅</button>
        <button class="btn-footer btn-janine" onclick="saveJanine()">✉️</button>
        <button class="btn-footer btn-teilen" onclick="openShare()">📤</button>
        <button class="btn-footer btn-save" onclick="manualSave()">💾</button>
    </div>

    <script>
        let userData = null;
        let entries = {};
        let PLAN = {};
        let selectedDate = new Date();
        let calendarDate = new Date();
        let todayValue = 0;
        let saveTimeout = null;

        function init() {
            let userName = localStorage.getItem('last_stundenzettel_user');
            
            if (!userName) {
                const names = Object.keys(localStorage).filter(k => k.startsWith('stundenzettel_'));
                if (names.length === 0) {
                    window.location.href = 'index.html';
                    return;
                }
                userName = names[names.length - 1].replace('stundenzettel_', '');
            }

            userData = JSON.parse(localStorage.getItem(`stundenzettel_${userName}`));
            if (!userData) {
                window.location.href = 'index.html';
                return;
            }
            
            entries = userData.eintraege || {};
            buildPlan();
            
            const displayName = userData.name
                .split('_')
                .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
                .join(' ');
            
            document.getElementById('userName').textContent = displayName;
            const weekHours = Math.round(userData.wochenstunden * 10) / 10;
            document.getElementById('weekHours').textContent = weekHours.toLocaleString('de-DE') + ' Std. / Woche';
            
            selectedDate = new Date();
            calendarDate = new Date();
            render();
        }

        function buildPlan() {
            const dayMap = { 'Montag': 1, 'Dienstag': 2, 'Mittwoch': 3, 'Donnerstag': 4, 'Freitag': 5 };
            PLAN = {};
            
            userData.schedule.forEach(item => {
                const dow = dayMap[item.day];
                if (dow) {
                    PLAN[dow] = {
                        day: item.day,
                        von: item.von || '08:00',
                        bis: item.bis || '15:00',
                        soll: item.soll || 0  // ← Benutze direkt die gespeicherten Stunden!
                    };
                }
            });
        }

        function calculateSaldo() {
            let total = 0;
            for (const dateStr in entries) {
                total += (entries[dateStr].hours || 0);
            }
            return Math.round(total * 100) / 100;
        }

        function updateSaldo() {
            const saldo = calculateSaldo();
            const sign = saldo < 0 ? '−' : '+';
            const abs = Math.abs(saldo);
            const hours = Math.floor(abs);
            const mins = Math.round((abs - hours) * 60);
            document.getElementById('saldo').textContent = `Saldo: ${sign}${hours},${String(mins).padStart(2, '0')}h`;
        }

        function render() {
            renderToday();
            renderCalendar();
            updateSaldo();
        }

        function renderToday() {
            const dateStr = formatDate(selectedDate);
            const dayOfWeek = selectedDate.getDay();
            const planDay = PLAN[dayOfWeek] || PLAN[dayOfWeek === 0 ? 7 : dayOfWeek];
            
            const dayName = selectedDate.toLocaleDateString('de-DE', { weekday: 'short' });
            const dayNum = selectedDate.getDate();
            const monthName = selectedDate.toLocaleDateString('de-DE', { month: 'long' });
            
            document.getElementById('todayDay').textContent = `${dayName.charAt(0).toUpperCase() + dayName.slice(1)}, ${dayNum}. ${monthName}`;
            
            if (planDay) {
                document.getElementById('todayTime').textContent = `${planDay.von}–${planDay.bis}`;
                todayValue = planDay.soll;
            } else {
                document.getElementById('todayTime').textContent = '–:–';
                todayValue = 0;
            }

            if (!entries[dateStr]) {
                entries[dateStr] = { hours: todayValue, status: 'normal', notes: '' };
            }

            const entry = entries[dateStr];
            todayValue = entry.hours || todayValue;
            
            updateTodayDisplay();
            updateStatusButtons(entry.status || 'normal');
            document.getElementById('notesInput').value = entry.notes || '';
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function updateTodayDisplay() {
            const sign = todayValue < 0 ? '−' : '';
            const abs = Math.abs(todayValue);
            const hours = Math.floor(abs);
            const mins = Math.round((abs - hours) * 60);
            
            document.getElementById('todayHours').textContent = `${sign}${hours},${String(mins).padStart(2, '0')}`;
            
            const maxHours = userData.wochenstunden / 5;
            const percent = Math.min(100, (todayValue / maxHours) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function addHours(delta) {
            todayValue = Math.round((todayValue + delta) * 100) / 100;
            updateTodayDisplay();
            saveEntry();
            autoSave();
            
            // Zeige kleine Anzeige für die Änderung
            const indicator = document.getElementById('changeIndicator');
            const sign = delta > 0 ? '+' : '−';
            const absMinutes = Math.round(Math.abs(delta) * 60);
            const mins = absMinutes % 60;
            const hours = Math.floor(absMinutes / 60);
            
            let text = '';
            if (hours > 0) {
                text = `${sign}${hours}h`;
                if (mins > 0) text += ` ${mins}min`;
            } else {
                text = `${sign}${mins} min`;
            }
            
            const color = delta > 0 ? '#3db356' : '#d9534f';
            indicator.textContent = text;
            indicator.style.color = color;
            indicator.style.fontWeight = '600';
            indicator.style.fontSize = '13px';
            
            // Entferne die Anzeige nach 2 Sekunden
            setTimeout(() => {
                indicator.textContent = '';
            }, 2000);
        }

        function setStatus(status) {
            const dateStr = formatDate(selectedDate);
            if (!entries[dateStr]) entries[dateStr] = { hours: todayValue, status, notes: '' };
            
            entries[dateStr].status = status;
            
            if (status === 'frei' || status === 'schule') {
                todayValue = -Math.abs(todayValue);
            } else if (status === 'krank') {
                // Stunden bleiben
            } else {
                todayValue = Math.abs(todayValue);
            }
            
            entries[dateStr].hours = todayValue;
            updateTodayDisplay();
            updateStatusButtons(status);
            saveEntry();
            autoSave();
            render();
        }

        function updateStatusButtons(status) {
            document.getElementById('btn-normal').classList.toggle('active', status === 'normal');
            document.getElementById('btn-frei').classList.toggle('active', status === 'frei');
            document.getElementById('btn-krank').classList.toggle('active', status === 'krank');
            document.getElementById('btn-schule').classList.toggle('active', status === 'schule');
        }

        function saveNotes() {
            const dateStr = formatDate(selectedDate);
            if (!entries[dateStr]) entries[dateStr] = { hours: todayValue, status: 'normal', notes: '' };
            entries[dateStr].notes = document.getElementById('notesInput').value;
            saveEntry();
            autoSave();
        }

        function saveEntry() {
            const dateStr = formatDate(selectedDate);
            entries[dateStr] = entries[dateStr] || { hours: todayValue, status: 'normal', notes: '' };
            entries[dateStr].hours = todayValue;
        }

        function autoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                userData.eintraege = entries;
                const key = `stundenzettel_${userData.name}`;
                localStorage.setItem(key, JSON.stringify(userData));
                showSaveIndicator();
                render(); // Komplette UI aktualisieren, nicht nur Saldo
            }, 500);
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('show');
            setTimeout(() => {
                indicator.classList.remove('show');
            }, 2000);
        }

        function manualSave() {
            userData.eintraege = entries;
            const key = `stundenzettel_${userData.name}`;
            localStorage.setItem(key, JSON.stringify(userData));
            showSaveIndicator();
            render(); // Komplette UI aktualisieren
        }

        function backToToday() {
            selectedDate = new Date();
            render();
        }

        function renderCalendar() {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            
            document.getElementById('monthTitle').textContent = 
                calendarDate.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            let startDow = firstDay.getDay() - 1;
            if (startDow < 0) startDow = 6;
            
            let html = '';
            
            const prevLastDay = new Date(year, month, 0);
            for (let i = startDow - 1; i >= 0; i--) {
                const day = prevLastDay.getDate() - i;
                html += `<div class="calendar-day other-month">${day}</div>`;
            }
            
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const date = new Date(year, month, day);
                const dateStr = formatDate(date);
                const dow = date.getDay();
                
                if (dow === 0 || dow === 6) continue;
                
                const entry = entries[dateStr];
                const value = entry ? Math.abs(entry.hours) : 0;
                const status = entry?.status || 'normal';
                
                let bgColor = '#d4f5d4';
                if (status === 'frei') bgColor = '#ffcdd2';
                if (status === 'krank') bgColor = '#fff9c4';
                if (status === 'schule') bgColor = '#e0e0e0';
                
                const sign = entry && entry.hours < 0 ? '−' : '+';
                const abs = Math.abs(value);
                const hours = Math.floor(abs);
                const mins = Math.round((abs - hours) * 60);
                const displayVal = value > 0 ? `${sign}${hours},${String(mins).padStart(2, '0')}` : '–';
                
                html += `<div class="calendar-day" style="background: ${bgColor};" onclick="selectDateAndClose('${year}', '${month}', '${day}')">
                    <div class="calendar-day-num">${day}</div>
                    <div class="calendar-day-value">${displayVal}</div>
                </div>`;
            }
            
            document.getElementById('calendarGrid').innerHTML = html;
        }

        function selectDateAndClose(year, month, day) {
            selectedDate = new Date(year, month, day);
            closeCalendar();
            render();
        }

        function openCalendar() {
            calendarDate = new Date(selectedDate);
            renderCalendar();
            document.getElementById('calendarModal').classList.add('open');
        }

        function closeCalendar() {
            document.getElementById('calendarModal').classList.remove('open');
        }

        function prevMonth() {
            calendarDate.setMonth(calendarDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            calendarDate.setMonth(calendarDate.getMonth() + 1);
            renderCalendar();
        }

        function openShare() {
            const text = `Stundenzettel:\n${Object.entries(entries).map(([d, e]) => {
                const sign = e.hours < 0 ? '−' : '+';
                const abs = Math.abs(e.hours);
                const hours = Math.floor(abs);
                const mins = Math.round((abs - hours) * 60);
                return `${d}: ${sign}${hours},${String(mins).padStart(2, '0')}`;
            }).join('\n')}`;
            
            if (navigator.share) {
                navigator.share({ title: 'Stundenzettel', text });
            }
        }

        function saveJanine() {
            manualSave();
            alert('✉️ An Janine gesendet!');
            const janinData = {
                name: 'JANINE',
                wochenstunden: 31,
                schedule: [
                    {day: 'Montag', von: '08:00', bis: '15:00', team: false},
                    {day: 'Dienstag', von: '08:00', bis: '15:00', team: false},
                    {day: 'Mittwoch', von: '08:00', bis: '15:00', team: false},
                    {day: 'Donnerstag', von: '08:00', bis: '15:00', team: false},
                    {day: 'Freitag', von: '08:00', bis: '15:00', team: false}
                ],
                eintraege: {},
                erstellt: new Date().toISOString()
            };
            localStorage.setItem('stundenzettel_JANINE', JSON.stringify(janinData));
            window.location.href = 'dashboard.html';
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
