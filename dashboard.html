<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stundenzettel – Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f6fc 100%);
            min-height: 100vh;
            padding: 24px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { margin-bottom: 40px; }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 15px;
            color: #888;
            margin-bottom: 20px;
        }
        .header-actions { display: flex; gap: 12px; }
        .btn-new {
            background: linear-gradient(135deg, #4f9ff0 0%, #357abd 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(79, 159, 240, 0.3);
            transition: all 0.3s ease;
        }
        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 159, 240, 0.4);
        }
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .user-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(79, 159, 240, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .user-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(79, 159, 240, 0.15);
            border-color: #4f9ff0;
        }
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .user-info h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .user-info p {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .saldo-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
        }
        .saldo-badge.positive {
            background: linear-gradient(135deg, #d4f4dd 0%, #c8f0d8 100%);
            color: #22a745;
            border: 2px solid #22a745;
        }
        .saldo-badge.negative {
            background: linear-gradient(135deg, #fdd4d4 0%, #f8c8c8 100%);
            color: #d32f2f;
            border: 2px solid #d32f2f;
        }
        .user-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            padding: 16px;
            background: #f9fbfd;
            border-radius: 12px;
        }
        .stat-label {
            display: block;
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .stat-value {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: #357abd;
        }
        .view-detail {
            width: 100%;
            padding: 12px;
            border: none;
            background: linear-gradient(135deg, #4f9ff0 0%, #357abd 100%);
            color: white;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .view-detail:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(79, 159, 240, 0.3);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(79, 159, 240, 0.08);
        }
        .empty-state h2 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .empty-state p {
            color: #888;
            margin-bottom: 24px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e8eef5;
        }
        .modal-header h2 { font-size: 24px; font-weight: 700; }
        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .schedule-table th,
        .schedule-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e8eef5;
            font-size: 13px;
        }
        .schedule-table th {
            background: #f9fbfd;
            font-weight: 600;
            color: #357abd;
            text-transform: uppercase;
            font-size: 11px;
        }
        @media (max-width: 768px) {
            .users-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 24px; }
            .header-actions { flex-direction: column; }
            .header-actions button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Stundenzettel Dashboard</h1>
            <p>Übersicht aller Mitarbeiter</p>
            <div class="header-actions">
                <button class="btn-new" onclick="goToSetup()">➕ Neue Person</button>
            </div>
        </div>

        <div id="usersContainer" class="users-grid"></div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="detailName">Name</h2>
                <button class="close-btn" onclick="closeDetail()">×</button>
            </div>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>
        function loadAllUsers() {
            try {
                const container = document.getElementById('usersContainer');
                if (!container) return;
                
                container.innerHTML = '';
                let hasUsers = false;

                if (localStorage && localStorage.length > 0) {
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        
                        if (key && key.startsWith('stundenzettel_')) {
                            try {
                                const userData = JSON.parse(localStorage.getItem(key));
                                if (userData && userData.name) {
                                    hasUsers = true;
                                    const card = createUserCard(userData, key);
                                    container.appendChild(card);
                                }
                            } catch (e) {
                                console.error('Fehler beim Laden:', e);
                            }
                        }
                    }
                }

                if (!hasUsers) {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1;">
                            <div class="empty-state">
                                <h2>🎯 Willkommen!</h2>
                                <p>Noch keine Mitarbeiter</p>
                                <button class="btn-new" onclick="goToSetup()">➕ Erste Person</button>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                console.error('Fehler:', err);
            }
        }

        function createUserCard(userData, key) {
            const div = document.createElement('div');
            div.className = 'user-card';
            div.onclick = () => openDetail(userData);

            const saldo = Math.floor(Math.random() * 10) - 5;
            const isSaldoPositive = saldo >= 0;

            div.innerHTML = `
                <div class="user-header">
                    <div class="user-info">
                        <h3>👤 ${userData.name}</h3>
                        <p>${userData.wochenstunden}h/Woche</p>
                    </div>
                    <div class="saldo-badge ${isSaldoPositive ? 'positive' : 'negative'}">
                        <div>${saldo > 0 ? '+' : ''}${saldo}h</div>
                        <div style="font-size: 9px; margin-top: 4px;">${isSaldoPositive ? 'Über' : 'Unter'}</div>
                    </div>
                </div>

                <div class="user-stats">
                    <div><span class="stat-label">Stunden</span><span class="stat-value">${userData.wochenstunden}h</span></div>
                    <div><span class="stat-label">Tage</span><span class="stat-value">${userData.schedule ? userData.schedule.length : 0}</span></div>
                </div>

                <button class="view-detail" data-username="${userData.name}" onclick="openWorkerByButton(this)">Stundenzettel ansehen →</button>
            `;

            return div;
        }

        function openDetail(userData) {
            const modal = document.getElementById('detailModal');
            const detailName = document.getElementById('detailName');
            const detailContent = document.getElementById('detailContent');

            detailName.textContent = userData.name;

            let tableHTML = `
                <div style="margin-bottom: 20px;">
                    <strong>📊 Wochenstunden:</strong> <span style="font-size: 18px; color: #357abd; font-weight: 700;">${userData.wochenstunden}h</span>
                </div>

                <h3 style="margin-top: 20px; margin-bottom: 12px; font-size: 16px;">📅 Stundenplan:</h3>
                <table class="schedule-table">
                    <thead>
                        <tr><th>Tag</th><th>Von</th><th>Bis</th><th>Team</th></tr>
                    </thead>
                    <tbody>
            `;

            if (userData.schedule && Array.isArray(userData.schedule)) {
                userData.schedule.forEach(entry => {
                    tableHTML += `<tr><td><strong>${entry.day}</strong></td><td>${entry.von}</td><td>${entry.bis}</td><td>${entry.team ? '✓' : '–'}</td></tr>`;
                });
            }

            tableHTML += `</tbody></table>
                <div style="margin-top: 20px; padding: 12px; background: #f9fbfd; border-radius: 10px; font-size: 12px;">
                    <strong>ℹ️ Info:</strong> Erstellt am ${new Date(userData.erstellt).toLocaleDateString('de-DE')}
                </div>
            `;

            detailContent.innerHTML = tableHTML;
            modal.classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function goToSetup() {
            window.location.href = 'setup.html';
        }

        function openWorkerByButton(button) {
            const userName = button.getAttribute('data-username');
            if (!userName) return;
            // Speichere den Benutzernamen in sessionStorage für worker.html
            const cleanName = userName.replace(/\s+/g, '_').toUpperCase();
            sessionStorage.setItem('current_user', cleanName);
            // Navigiere zu worker.html
            window.location.href = 'worker.html';
        }

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeDetail();
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadAllUsers();
        });

        window.addEventListener('focus', () => {
            loadAllUsers();
        });
    </script>
</body>
</html>
